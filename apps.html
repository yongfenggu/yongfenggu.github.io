<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="古永丰的应用集合 - Apps by Yongfeng Gu">
    <title>Apps | Yongfeng Gu</title>
    <link rel="icon" href="./assets/img/favicon.png" type="image/jpeg">
    <link rel="stylesheet" href="./assets/css/pages.css">
    <style>
        .app-item {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .app-preview {
            width: 200px;
            height: 120px;
            flex-shrink: 0;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            background: #f5f5f5;
            position: relative;
        }

        .app-preview iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 500%;
            height: 500%;
            border: none;
            pointer-events: none;
            transform: scale(0.2);
            transform-origin: top left;
        }

        .app-info {
            flex: 1;
        }

        @media (max-width: 768px) {
            .app-item {
                flex-direction: column;
            }

            .app-preview {
                width: 100%;
                height: 160px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-container">
            <a href="./index.html" class="nav-brand">
                <img src="assets/img/favicon-1.png" alt="favicon" style="height: 1.2em; vertical-align: middle; margin-right: 0.5em;">Yongfeng's Homepage
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="./publications.html" class="nav-link">Publications</a>
                <a href="./experience.html" class="nav-link">Experience</a>
                <a href="./projects.html" class="nav-link">Projects</a>
                <a href="./apps.html" class="nav-link active">Apps</a>
            </div>
        </div>
    </nav>

    <section class="page-section">
        <div class="container">
            <h2 class="section-title">Apps</h2>

            <div class="exp-block">
                <a href="./pages/events_viewer.html" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="app-item">
                        <div class="app-preview">
                            <iframe src="https://yongfenggu.github.io/pages/events_viewer.html" loading="lazy"></iframe>
                        </div>
                        <div class="app-info">
                            <div class="exp-header-row">
                                <div>
                                    <div class="item-title">Events.jsonl 可视化工具</div>
                                    <div class="item-meta">数据工具</div>
                                </div>
                                <div class="item-date">2026</div>
                            </div>
                            <div class="item-desc">用于查看和分析 events.jsonl 格式日志文件的可视化工具</div>
                        </div>
                    </div>
                </a>
            </div>

            <div class="exp-block">
                <a href="./pages/gobang.html" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="app-item">
                        <div class="app-preview">
                            <iframe src="https://yongfenggu.github.io/pages/gobang.html" loading="lazy"></iframe>
                        </div>
                        <div class="app-info">
                            <div class="exp-header-row">
                                <div>
                                    <div class="item-title">五子棋游戏</div>
                                    <div class="item-meta">游戏</div>
                                </div>
                                <div class="item-date">2026</div>
                            </div>
                            <div class="item-desc">经典五子棋游戏，支持双人对战和人机对战</div>
                        </div>
                    </div>
                </a>
            </div>

            <div class="exp-block">
                <a href="./pages/laser-alignment.html" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="app-item">
                        <div class="app-preview">
                            <iframe src="https://yongfenggu.github.io/pages/laser-alignment.html" loading="lazy"></iframe>
                        </div>
                        <div class="app-info">
                            <div class="exp-header-row">
                                <div>
                                    <div class="item-title">激光对中测量系统</div>
                                    <div class="item-meta">测量工具</div>
                                </div>
                                <div class="item-date">2025</div>
                            </div>
                            <div class="item-desc">基于激光测距的精密对中测量系统，支持实时数据监测和可视化分析</div>
                        </div>
                    </div>
                </a>
            </div>

            <div class="exp-block">
                <a href="./pages/xuexinwang/index.html" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="app-item">
                        <div class="app-preview">
                            <iframe src="https://yongfenggu.github.io/pages/xuexinwang/index.html" loading="lazy"></iframe>
                        </div>
                        <div class="app-info">
                            <div class="exp-header-row">
                                <div>
                                    <div class="item-title">学信网</div>
                                    <div class="item-meta">教育信息</div>
                                </div>
                                <div class="item-date">2026</div>
                            </div>

                        </div>
                    </div>
                </a>
            </div>
        </div>

    <footer>
        <div class="container">
            <p>&copy; <span class="year"></span> Yongfeng Gu</p>
        </div>
    </footer>
    <script>document.querySelector('.year').textContent = new Date().getFullYear();</script>
    <script>
        const navToggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');
        navToggle.addEventListener('click', () => {
            navToggle.classList.toggle('active');
            navLinks.classList.toggle('open');
        });
    </script>
</body>
</html>
